name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.3)'
        required: true

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      VCPKG_ROOT: C:/vcpkg

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up sccache
        uses: mozilla/sccache-action@v0.0.5

      - name: Set up vcpkg binary cache
        shell: bash
        run: |
          mkdir -p "${{ github.workspace }}/vcpkg-cache"
          echo "VCPKG_DEFAULT_BINARY_CACHE=${{ github.workspace }}/vcpkg-cache" >> "$GITHUB_ENV"

      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg-cache
          key: vcpkg-x64-windows-static-md-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-x64-windows-static-md-

      - name: Update version in CMakeLists.txt
        shell: bash
        run: |
          sed -i -E "s/(VERSION )[0-9]+\.[0-9]+\.[0-9]+/\1${{ inputs.version }}/" CMakeLists.txt

      - name: Configure CMake
        run: cmake --preset release -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build --preset release --parallel

      - name: Commit and push version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CMakeLists.txt
          git commit -m "chore: bump version to ${{ inputs.version }}"
          git push

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes \
            "build/InfoWidget-${{ inputs.version }}.zip"
