name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: windows-latest
    env:
      VCPKG_ROOT: C:/vcpkg

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Set up sccache
        uses: mozilla/sccache-action@v0.0.5

      - name: Set up vcpkg binary cache
        shell: bash
        run: |
          mkdir -p "${{ github.workspace }}/vcpkg-cache"
          echo "VCPKG_DEFAULT_BINARY_CACHE=${{ github.workspace }}/vcpkg-cache" >> "$GITHUB_ENV"

      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg-cache
          key: vcpkg-lint-x64-windows-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-lint-x64-windows-

      - name: Patch CommonLibSSE-NG for clang compatibility
        shell: bash
        run: |
          sed -i 's/a_rhs\.storage\.address/a_rhs._storage.address/' extern/CommonLibSSE-NG/include/RE/B/BSTPointerAndFlags.h
          sed -i 's/a_src\.Begin()/a_src.begin()/g; s/a_src\.End()/a_src.end()/g' extern/CommonLibSSE-NG/include/RE/G/GHashSetBase.h

      - name: Configure CMake
        env:
          VCPKG_ROOT: C:/vcpkg
        run: cmake --preset lint -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Run clang-tidy
        shell: bash
        run: |
          run-clang-tidy -quiet -extra-arg=-w -p build-lint infowidgets.src

  build:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      VCPKG_ROOT: C:/vcpkg

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up sccache
        uses: mozilla/sccache-action@v0.0.5

      - name: Set up vcpkg binary cache
        shell: bash
        run: |
          mkdir -p "${{ github.workspace }}/vcpkg-cache"
          echo "VCPKG_DEFAULT_BINARY_CACHE=${{ github.workspace }}/vcpkg-cache" >> "$GITHUB_ENV"

      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg-cache
          key: vcpkg-x64-windows-static-md-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-x64-windows-static-md-

      - name: Configure CMake
        run: cmake --preset release -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build --preset release --parallel

      - name: Rename ZIP with commit SHA
        shell: bash
        run: |
          short="${GITHUB_SHA::7}"
          for f in build/InfoWidget-*.zip; do
            mv "$f" "build/InfoWidgets-${short}.zip"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: InfoWidgets-${{ github.sha }}
          path: build/InfoWidgets-*.zip
          if-no-files-found: error

      - name: Publish rolling release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          short="${GITHUB_SHA::7}"
          gh release create "InfoWidgets-${short}" \
            --prerelease \
            --title "InfoWidgets-${short}" \
            --notes "Automated build from commit [\`${short}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})" \
            "build/InfoWidgets-${short}.zip"
